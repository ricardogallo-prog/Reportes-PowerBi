name: Generate Power BI Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 1 * *"

jobs:

  build-report:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch:
          - "Sede Convicción"
          - "Evolución"

    env:
      POWERBI_URL: ${{ secrets.POWERBI_URL }}
      BRANCH_OFFICE: ${{ matrix.branch }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - name: Scrape Power BI
        run: node scrape-powerbi.js

      - name: Parse Data
        run: node parse-data.js

      - name: Generate PPTX
        run: node generate-report.js

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convert PPTX to PDF
        run: |
          SAFE=$(echo "${BRANCH_OFFICE}" | sed 's/[^A-Za-z0-9]/_/g')
          libreoffice --headless --convert-to pdf "Reporte_${SAFE}_Q4_2025.pptx"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ matrix.branch }}
          path: |
            *.pptx
            *.pdf
            *.json
            *.png
